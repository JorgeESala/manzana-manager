<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <style>
      body { padding: 20px; font-family: 'Segoe UI', sans-serif; }
      .btn-egreso { background-color: #990000; color: white; width: 100%; font-weight: bold; }
      .header { text-align: center; color: #990000; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div class="header">
      <h4>Salida de Caja / Gasto</h4>
    </div>
    
    <form id="egresoForm">
      <div class="mb-3">
        <label class="form-label">Categoría del Gasto</label>
        <select class="form-select" id="categoria" required>
          <option value="Mantenimiento Piscina">Mantenimiento Piscina</option>
          <option value="Jardinería">Jardinería</option>
          <option value="Seguridad / Vigilancia">Seguridad / Vigilancia</option>
          <option value="Servicios (Luz/Agua)">Servicios (Luz/Agua)</option>
          <option value="Administración / Papelería">Administración / Papelería</option>
          <option value="Otros">Otros</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Descripción Detallada</label>
        <textarea class="form-control" id="descripcion" rows="2" placeholder="Ej: Compra de cloro para alberca y pastillas" required></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Monto Total ($)</label>
        <input type="number" class="form-control" id="monto" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Fecha del Gasto</label>
        <input type="date" class="form-control" id="fecha" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Método de Pago</label>
        <select class="form-select" id="metodo">
          <option value="Transferencia">Transferencia Bancaria</option>
          <option value="Efectivo (Caja Chica)">Efectivo (Caja Chica)</option>
        </select>
      </div>

      <button type="button" class="btn btn-egreso" onclick="registrar()">REGISTRAR GASTO</button>
    </form>

    <div id="resultado" class="mt-3 text-center fw-bold"></div>

    <script>
      document.getElementById('fecha').valueAsDate = new Date();

      function registrar() {
        const btn = document.querySelector('button');
        btn.disabled = true;
        
        const datos = {
          categoria: document.getElementById('categoria').value,
          descripcion: document.getElementById('descripcion').value,
          monto: document.getElementById('monto').value,
          fecha: document.getElementById('fecha').value,
          metodo: document.getElementById('metodo').value
        };

        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('resultado').className = "mt-3 text-center text-success";
            document.getElementById('resultado').innerHTML = res;
            document.getElementById('egresoForm').reset();
            document.getElementById('fecha').valueAsDate = new Date();
            btn.disabled = false;
          })
          .procesarEgresoHTML(datos);
      }
    </script>
  </body>
</html>
