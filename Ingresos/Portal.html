<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      function App() {
        const [modoBusqueda, setModoBusqueda] = useState('id'); // 'id' or 'name'
        const [textoBusqueda, setTextoBusqueda] = useState('');
        const [status, setStatus] = useState('idle'); // idle, loading, success, error
        const [data, setData] = useState(null);

        const handleConsultar = () => {
          if (!textoBusqueda.trim()) return;
          setStatus('loading');

          const fn = modoBusqueda === 'id' ? 'obtenerEstadoCuenta' : 'obtenerEstadoCuentaPorNombre';

          google.script.run
            .withSuccessHandler((res) => {
              if (res.error) {
                setStatus('error');
              } else {
                setData(res);
                setStatus('success');
              }
            })
            .withFailureHandler(() => setStatus('error'))
            [fn](textoBusqueda);
        };

        const handleKeyDown = (e) => {
          if (e.key === 'Enter') handleConsultar();
        };

        return (
          <div class="max-w-md mx-auto min-h-screen flex flex-col shadow-xl bg-white">
            {/* Header */}
            <header class="bg-indigo-700 text-white p-8 text-center rounded-b-3xl shadow-lg">
              <h1 class="text-2xl font-extrabold tracking-tight">MANZANA 80</h1>
              <p class="text-indigo-100 text-sm mt-1 opacity-90">Portal de Autogestión</p>
            </header>

            <main class="p-6 flex-grow">
              <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 shadow-inner">
                {/* Toggle */}
                <div class="flex bg-gray-200 rounded-lg p-1 mb-4">
                  <button
                    onClick={() => { setModoBusqueda('id'); setTextoBusqueda(''); setStatus('idle'); }}
                    class={`flex-1 py-2 text-sm font-bold rounded-md transition ${modoBusqueda === 'id' ? 'bg-white shadow text-indigo-700' : 'text-gray-500'}`}
                  >
                    Por ID
                  </button>
                  <button
                    onClick={() => { setModoBusqueda('name'); setTextoBusqueda(''); setStatus('idle'); }}
                    class={`flex-1 py-2 text-sm font-bold rounded-md transition ${modoBusqueda === 'name' ? 'bg-white shadow text-indigo-700' : 'text-gray-500'}`}
                  >
                    Por Nombre
                  </button>
                </div>

                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">
                  {modoBusqueda === 'id' ? 'ID de Vivienda' : 'Nombre del Propietario'}
                </label>
                <input 
                  type="text" 
                  placeholder={modoBusqueda === 'id' ? 'Ej: P2 101' : 'Ej: Juan Pérez'}
                  value={textoBusqueda}
                  onKeyDown={handleKeyDown}
                  onChange={(e) => setTextoBusqueda(e.target.value)}
                  class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-0 outline-none transition-all text-lg font-medium"
                />
                <button 
                  onClick={handleConsultar}
                  disabled={status === 'loading'}
                  class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4 hover:bg-indigo-700 transition shadow-md disabled:bg-gray-400"
                >
                  {status === 'loading' ? 'Consultando...' : 'Ver mi Estado de Cuenta'}
                </button>
              </div>

              {status === 'error' && (
                <div class="mt-6 p-4 bg-red-50 text-red-700 rounded-xl text-center text-sm font-medium border border-red-100 animate-fade-in">
                  ⚠️ No se encontró información. {modoBusqueda === 'id' ? 'Verifica que lleve el espacio (Ej: P2 101).' : 'Prueba escribiendo solo el nombre (sin apellido).'}
                </div>
              )}

              {status === 'success' && data && (
                <div class="mt-8 space-y-4 animate-fade-in">
                  {/* Card Propietario */}
                  <div class="border-l-4 border-indigo-500 p-4 bg-indigo-50 rounded-r-xl">
                    <p class="text-xs text-indigo-600 font-bold uppercase">Propietario</p>
                    <h2 class="text-xl font-bold text-gray-800">{data.nombre}</h2>
                    {data.bloque && <span class="inline-block mt-1 px-2 py-0.5 bg-indigo-200 text-indigo-800 text-xs font-bold rounded-full">Manzana {data.bloque}</span>}
                  </div>

                  {/* Card Saldo */}
                  <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800 text-white p-4 rounded-2xl">
                      <p class="text-[10px] uppercase font-bold text-slate-400">Saldo Pendiente</p>
                      <p class="text-2xl font-black">${data.saldo}</p>
                    </div>
                    <div class={`p-4 rounded-2xl ${data.piscina.includes('ACCESO') ? 'bg-emerald-100 text-emerald-800' : 'bg-orange-100 text-orange-800'}`}>
                      <p class="text-[10px] uppercase font-bold opacity-70">Estatus Piscina</p>
                      <p class="text-lg font-black">{data.piscina}</p>
                    </div>
                  </div>

                  {/* Lista de deudas si existen */}
                  {data.detalles && data.detalles.length > 0 && (
                    <div class="mt-6">
                      <h3 class="text-sm font-bold text-gray-400 uppercase mb-3 ml-1">Meses Pendientes</h3>
                      <div class="space-y-2">
                        {data.detalles.map((item, i) => (
                          <div key={i} class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                            <span class="font-bold text-gray-700">{item.mes}</span>
                            <span class="text-red-600 font-bold">${item.monto}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <footer class="mt-8 text-center py-6 border-t border-gray-100">
                    <p class="text-xs text-gray-400">Si ya realizaste tu pago, recuerda enviar el comprobante a administración para su validación.</p>
                  </footer>
                </div>
              )}
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
