<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <style>
    body { padding: 20px; font-family: 'Segoe UI', sans-serif; }
    .btn-search { background-color: #4a86e8; color: white; width: 100%; font-weight: bold; }
    .header { text-align: center; color: #674ea7; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h4>Buscar Propietario</h4>
  </div>

  <form id="busquedaForm">
    <div class="mb-3">
      <label class="form-label">Manzana</label>
      <select class="form-select" id="manzana" required>
        <option value="MZ 17">MZ 17</option>
        <option value="MZ 19">MZ 19</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">ID Vivienda</label>
      <input type="text" class="form-control" id="idVivienda" placeholder="Ej: P2 101" required>
    </div>

    <button type="button" class="btn btn-search" onclick="buscar()">BUSCAR</button>
  </form>

  <div id="resultado" class="mt-3"></div>

  <script>
    function buscar() {
      const btn = document.querySelector('button');
      btn.disabled = true;

      const datos = {
        manzana: document.getElementById('manzana').value,
        idVivienda: document.getElementById('idVivienda').value.trim().toUpperCase()
      };

      if (!datos.idVivienda) {
        document.getElementById('resultado').innerHTML = '<div class="text-danger">Ingresa un ID de vivienda.</div>';
        btn.disabled = false;
        return;
      }

      document.getElementById('resultado').innerHTML = '<div class="text-center text-muted">Buscando...</div>';

      google.script.run
        .withSuccessHandler(res => {
          btn.disabled = false;
          document.getElementById('resultado').innerHTML = res;
        })
        .withFailureHandler(err => {
          btn.disabled = false;
          document.getElementById('resultado').innerHTML = '<div class="text-danger">Error: ' + err.message + '</div>';
        })
        .procesarBusquedaGlobal(datos);
    }
  </script>
</body>
</html>
