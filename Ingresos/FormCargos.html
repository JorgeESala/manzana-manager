<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <style>
      body { padding: 20px; font-family: 'Segoe UI', sans-serif; }
      .btn-save { background-color: #38761d; color: white; width: 100%; font-weight: bold; }
      .header { text-align: center; color: #1e3a8a; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div class="header">
      <h4>Generar Cargos Mensuales</h4>
    </div>

    <div id="formContainer">
      <form id="cargosForm">
        <div class="mb-3">
          <label class="form-label">Mes</label>
          <select class="form-select" id="mes" required>
            <option value="Enero">Enero</option>
            <option value="Febrero">Febrero</option>
            <option value="Marzo">Marzo</option>
            <option value="Abril">Abril</option>
            <option value="Mayo">Mayo</option>
            <option value="Junio">Junio</option>
            <option value="Julio">Julio</option>
            <option value="Agosto">Agosto</option>
            <option value="Septiembre">Septiembre</option>
            <option value="Octubre">Octubre</option>
            <option value="Noviembre">Noviembre</option>
            <option value="Diciembre">Diciembre</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Año</label>
          <select class="form-select" id="anio" required></select>
        </div>

        <div class="mb-3">
          <label class="form-label">Monto de Cuota ($)</label>
          <input type="number" class="form-control" id="monto" placeholder="Ej: 500" required>
        </div>

        <button type="button" class="btn btn-save" onclick="verificar()">VERIFICAR Y GENERAR</button>
      </form>
    </div>

    <div id="resultado" class="mt-3 text-center fw-bold"></div>

    <script>
      // Fill year dropdown
      const anioSelect = document.getElementById('anio');
      const anioActual = new Date().getFullYear();
      for (let a = anioActual; a >= anioActual - 1; a--) {
        const opt = document.createElement('option');
        opt.value = a;
        opt.text = a;
        anioSelect.appendChild(opt);
      }

      // Default to current month
      const mesActual = new Date().getMonth();
      anioSelect.selectedIndex = 0;

      function verificar() {
        const mes = document.getElementById('mes').value;
        const anio = document.getElementById('anio').value;
        const monto = document.getElementById('monto').value;

        if (!mes || !anio || !monto) {
          document.getElementById('resultado').className = "mt-3 text-center text-danger";
          document.getElementById('resultado').innerHTML = "Completa todos los campos.";
          return;
        }

        const btn = document.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = "Verificando...";

        google.script.run
          .withSuccessHandler(function(res) {
            if (res.duplicados > 0) {
              if (confirm('Ya existen ' + res.duplicados + ' cargos para ' + mes + ' ' + anio + '.\n\n¿Deseas generar CARGOS ADICIONALES (no duplicar los existentes)?')) {
                generar(mes, anio, monto);
              } else {
                btn.disabled = false;
                btn.innerHTML = "VERIFICAR Y GENERAR";
              }
            } else {
              generar(mes, anio, monto);
            }
          })
          .withFailureHandler(function(err) {
            document.getElementById('resultado').className = "mt-3 text-center text-danger";
            document.getElementById('resultado').innerHTML = err.message;
            btn.disabled = false;
            btn.innerHTML = "VERIFICAR Y GENERAR";
          })
          .verificarCargosExistentes(mes + ' ' + anio);
      }

      function generar(mes, anio, monto) {
        const btn = document.querySelector('button');
        btn.innerHTML = "Generando...";

        google.script.run
          .withSuccessHandler(function(res) {
            document.getElementById('resultado').className = "mt-3 text-center text-success";
            document.getElementById('resultado').innerHTML = res;
            btn.disabled = false;
            btn.innerHTML = "GENERAR OTROS CARGOS";
            document.getElementById('cargosForm').reset();
          })
          .withFailureHandler(function(err) {
            document.getElementById('resultado').className = "mt-3 text-center text-danger";
            document.getElementById('resultado').innerHTML = err.message;
            btn.disabled = false;
            btn.innerHTML = "VERIFICAR Y GENERAR";
          })
          .generarCargosConFormulario(mes + ' ' + anio, monto);
      }
    </script>
  </body>
</html>
